name: Android CI

on:
  push:
    paths:
      - 'controller/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'controller/**'

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        working-directory: controller
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "POCKET_NOC_SECRET=test-secret-key-for-ci-build-only-32chars" >> local.properties

      - name: Build debug APK
        working-directory: controller
        run: ./gradlew assembleDebug --no-daemon

      - name: Run lint
        working-directory: controller
        run: ./gradlew lint --no-daemon

      - name: Upload APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: pocketnoc-debug-apk
          path: controller/app/build/outputs/apk/debug/*.apk

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        working-directory: controller
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "POCKET_NOC_SECRET=test-secret-key-for-ci-build-only-32chars" >> local.properties

      - name: Run unit tests
        working-directory: controller
        run: ./gradlew test --no-daemon
