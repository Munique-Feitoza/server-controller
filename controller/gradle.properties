# Aumenta a memória RAM do Gradle para 4GB e define o padrão de texto
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Liga o processamento paralelo (usa os vários núcleos do seu i5)
org.gradle.parallel=true

# Liga o cache para as próximas vezes compilarem em segundos
org.gradle.caching=true

# Liga o suporte às bibliotecas modernas do AndroidX
android.useAndroidX=true

# Ativa a conversão automática de bibliotecas antigas para AndroidX
android.enableJetifier=true

# Define o JDK 17 como padrão para o Gradle (compatibilidade com AGP 8.2.2)
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk
